<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RCS Attendance Management System — Login">
  <title>RCS Attendance Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="app-container">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon">RCS</div>
          <h1>Attendance Manager</h1>
          <p>Sign in to your account</p>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-input" placeholder="Enter your username" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          </div>
          <div id="loginError" class="hidden" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; text-align: center;"></div>
          <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-lg">
            Sign In
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/login.js"></script>
</body>
</html>
